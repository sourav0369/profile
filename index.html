        body { background-color: #000; color: #fff; cursor: crosshair; font-family: 'EB Garamond', serif; overflow-x: hidden; }

        nav button.active { opacity: 1; border-bottom: 2px solid white; }

        .profile-circle {
            float: left;
            width: 280px;
            height: 280px;
            shape-outside: circle(50%);
            border-radius: 50%;
            margin-right: 50px;
            margin-bottom: 20px;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.15);
        }

        .card-container { perspective: 1000px; height: 350px; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .card-container:hover .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border: 1px solid #222; overflow: hidden; }
        .card-back { transform: rotateY(180deg); background: #fff; color: #000; padding: 25px; display: flex; flex-direction: column; justify-content: center; }

        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; }
        .accordion-active .accordion-content { 
            max-height: 70vh; 
            overflow-y: auto; 
            padding: 40px 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .accordion-content::-webkit-scrollbar { width: 4px; }
        .accordion-content::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
        
        .fade-in { animation: fadeIn 1.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @keyframes scan {
            0% { transform: translateY(-10px); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(300px); opacity: 0; }
        }
        .scan-line { animation: scan 3s linear infinite; }
    </style>
</head>

    <div id="canvas-container"></div>
    
    <nav class="fixed top-0 w-full z-50 flex justify-center gap-12 p-6 bg-black/80 backdrop-blur-md border-b border-white/10">
        <button onclick="showSection('home')" id="btn-home" class="active uppercase text-[10px]">Home</button>
        <button onclick="showSection('blog')" id="btn-blog" class="uppercase text-[10px]">Blogs</button>
        <button onclick="showSection('contact')" id="btn-contact" class="uppercase text-[10px]">Contact</button>
    </nav>

    <main id="main-content" class="pt-40 px-6 max-w-6xl mx-auto min-h-screen"></main>

        let portfolioData = null;

        async function init() {
            try {
                const res = await fetch('./data.json');
                if (!res.ok) throw new Error("File Not Found");
                portfolioData = await res.json();
                showSection('home');
                startParticles();
            } catch (e) {
                document.getElementById('main-content').innerHTML = `<div class="text-center py-20">Error loading data.json.</div>`;
            }
        }

        function showSection(id) {
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${id}`).classList.add('active');
            const main = document.getElementById('main-content');
            
            if (id === 'home') {
                main.innerHTML = `
                <div class="fade-in">
                    <div class="mb-32 block overflow-hidden">
                        <img src="${portfolioData.profile.photo}" class="profile-circle grayscale hover:grayscale-0 transition-all duration-1000">
                        <h1 class="name-brand text-7xl md:text-9xl font-black uppercase leading-none mb-8">${portfolioData.profile.name}</h1>
                        <p class="text-3xl italic opacity-95 mb-4 leading-snug">"${portfolioData.profile.subTagline}"</p>
                        <p class="text-xl uppercase tracking-[0.2em] opacity-60 mb-10">${portfolioData.profile.tagline}</p>
                        <div class="flex gap-4">
                            <a href="mailto:${portfolioData.profile.email}" class="border border-white/30 px-8 py-2 hover:bg-white hover:text-black transition uppercase text-[10px] tracking-widest">Email</a>
                            <a href="${portfolioData.profile.cvFilename}" download class="border border-white/30 px-8 py-2 hover:bg-white hover:text-black transition uppercase text-[10px] tracking-widest">My-CV</a>
                        </div>
                    </div>
                    
                    <h2 class="text-2xl uppercase tracking-[0.4em] mb-12 border-b border-white/10 pb-4 inline-block">About Me</h2>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-24">
                        ${portfolioData.pillars.map(p => `
                            <div class="card-container">
                                <div class="card-inner">
                                    <div class="card-front">
                                        <img src="${p.image}" class="w-full h-full object-cover opacity-30 grayscale">
                                        <div class="absolute bottom-6 left-6 text-xl font-bold uppercase tracking-widest">${p.title}</div>
                                    </div>
                                    <div class="card-back">
                                        <h4 class="font-bold border-b border-black/10 pb-2 mb-4 uppercase text-[10px] tracking-widest">${p.title}</h4>
                                        <ul class="text-[12px] leading-relaxed space-y-2">
                                            ${p.bullets.map(b => `<li>• ${b}</li>`).join('')}
                                        </ul>
                                    </div>
                                </div>
                            </div>`).join('')}

                            <div class="border border-white/10 bg-white/5 p-8 md:p-12 hover:bg-white/10 transition-all group relative overflow-hidden">
                                <div class="flex justify-between items-start mb-8">
                                    <div class="flex items-center gap-3">
                                        <span class="relative flex h-2 w-2">

            const container = document.getElementById('canvas-container');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);

            container.appendChild(renderer.domElement);
            const stars = new THREE.BufferGeometry();
            const posArr = new Float32Array(5000);
            for(let i=0; i<5000; i++) posArr[i] = (Math.random()-0.5)*1200;

            camera.position.z = 150;
            function anim() { requestAnimationFrame(anim); mesh.rotation.y += 0.0005; renderer.render(scene, camera); }
            anim();
            window.addEventListener('resize', () => { 
                camera.aspect = window.innerWidth / window.innerHeight; 
                camera.updateProjectionMatrix(); 
                renderer.setSize(window.innerWidth, window.innerHeight); 
            });
        }
        init();
    </script>
