<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sourav Pattanaik | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { 
            background-color: #000; color: #fff; cursor: crosshair; 
            font-family: 'EB Garamond', Garamond, 'Times New Roman', serif; 
        }
        .section-hidden { display: none; }
        #canvas-container { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }
        
        /* Navigation Icons */
        nav button { opacity: 0.5; transition: 0.3s; }
        nav button.active { opacity: 1; border-bottom: 2px solid white; }

        /* Independent Tile Flipping Fix */
        .card-container { perspective: 1000px; height: 350px; }
        .card-inner { 
            position: relative; width: 100%; height: 100%; 
            transition: transform 0.6s; transform-style: preserve-3d; 
        }
        .card-container:hover .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { 
            position: absolute; width: 100%; height: 100%; 
            backface-visibility: hidden; border: 1px solid #333; 
        }
        .card-back { transform: rotateY(180deg); background: white; color: black; padding: 20px; }
        
        /* Accordion Logic */
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; }
        .accordion-active .accordion-content { max-height: 300px; padding: 20px 0; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="canvas-container"></div>

    <nav class="fixed top-0 w-full z-50 flex justify-center gap-12 p-6 bg-black/50 backdrop-blur-md border-b border-white/10">
        <button onclick="showSection('home')" id="btn-home" class="active uppercase tracking-widest text-xs">Home</button>
        <button onclick="showSection('about')" id="btn-about" class="uppercase tracking-widest text-xs">About Me</button>
        <button onclick="showSection('blog')" id="btn-blog" class="uppercase tracking-widest text-xs">Blogs</button>
        <button onclick="showSection('contact')" id="btn-contact" class="uppercase tracking-widest text-xs">Contact</button>
    </nav>

    <main id="main-content" class="pt-24 px-6 max-w-6xl mx-auto">
        <div id="loader" class="h-screen flex items-center justify-center italic">Loading Database...</div>
    </main>

    <script>
        let portfolioData = null;

        async function init() {
            try {
                const res = await fetch('data.json');
                portfolioData = await res.json();
                showSection('home');
                startParticles();
            } catch (e) { document.getElementById('main-content').innerHTML = "Error loading data.json"; }
        }

        function showSection(sectionId) {
            // Update buttons
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${sectionId}`).classList.add('active');

            const main = document.getElementById('main-content');
            
            if (sectionId === 'home') {
                main.innerHTML = `
                    <div class="flex flex-col md:flex-row items-center justify-between min-h-[80vh] gap-12">
                        <img src="${portfolioData.profile.photo}" class="w-64 h-64 object-cover border border-white/20 shadow-2xl">
                        <div class="flex-1 text-right">
                            <h1 class="text-7xl font-bold uppercase tracking-tighter">${portfolioData.profile.name}</h1>
                            <p class="text-xl italic mt-4 opacity-80">"${portfolioData.profile.subTagline}"</p>
                            <div class="flex gap-6 justify-end mt-8">
                                <a href="mailto:${portfolioData.profile.email}" class="border border-white px-8 py-2 hover:bg-white hover:text-black transition uppercase text-xs">Email</a>
                                <a href="${portfolioData.profile.cvFilename}" download class="border border-white px-8 py-2 hover:bg-white hover:text-black transition uppercase text-xs">Sourav-CV</a>
                            </div>
                        </div>
                    </div>`;
            } else if (sectionId === 'about') {
                main.innerHTML = `
                    <h2 class="text-4xl uppercase mb-12 text-center">More About Me</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                        ${portfolioData.pillars.map(p => `
                            <div class="card-container">
                                <div class="card-inner">
                                    <div class="card-front">
                                        <img src="${p.image}" class="w-full h-full object-cover opacity-40">
                                        <div class="absolute bottom-4 left-4 text-xl font-bold uppercase">${p.title}</div>
                                    </div>
                                    <div class="card-back">
                                        <h4 class="font-bold border-b border-black mb-4 uppercase text-sm">${p.title}</h4>
                                        <ul class="text-[11px] leading-relaxed space-y-2" style="font-family: 'Times New Roman', serif;">
                                            ${p.bullets.map(b => `<li>• ${b}</li>`).join('')}
                                        </ul>
                                    </div>
                                </div>
                            </div>`).join('')}
                    </div>`;
            } else if (sectionId === 'blog') {
                main.innerHTML = `
                    <h2 class="text-4xl uppercase mb-12 text-center">Writings</h2>
                    <div class="max-w-2xl mx-auto space-y-4">
                        ${['Academics', 'Sports', 'Co-Curricular'].map(cat => {
                            const key = cat.toLowerCase().replace('-', '');
                            return `
                            <div class="border border-white/10" onclick="this.classList.toggle('accordion-active')">
                                <div class="p-6 cursor-pointer flex justify-between uppercase tracking-widest text-sm bg-white/5">
                                    ${cat} <span>+</span>
                                </div>
                                <div class="accordion-content px-6 italic text-sm opacity-70">
                                    ${portfolioData.blogs[key].map(post => `<p class="mb-4">${post}</p>`).join('')}
                                </div>
                            </div>`;
                        }).join('')}
                    </div>`;
            } else if (sectionId === 'contact') {
                main.innerHTML = `
                    <div class="max-w-xl mx-auto py-20 text-center">
                        <h2 class="text-5xl uppercase mb-8">Get In Touch</h2>
                        <form action="https://formspree.io/f/YOUR_ID" method="POST" class="space-y-4">
                            <input name="email" type="email" placeholder="YOUR EMAIL" class="w-full bg-transparent border border-white/20 p-4 text-xs focus:border-white outline-none">
                            <textarea name="message" placeholder="MESSAGE" class="w-full bg-transparent border border-white/20 p-4 text-xs h-32 focus:border-white outline-none"></textarea>
                            <button class="w-full border border-white py-4 uppercase text-xs hover:bg-white hover:text-black transition">Submit</button>
                        </form>
                    </div>`;
            }
        }

        function startParticles() {
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({alpha: true});
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            const stars = new THREE.BufferGeometry();
            const posArr = new Float32Array(3000);
            for(let i=0; i<3000; i++) posArr[i] = (Math.random()-0.5)*1000;
            stars.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
            const material = new THREE.PointsMaterial({size: 0.7, color: 0xffffff});
            const mesh = new THREE.Points(stars, material);
            scene.add(mesh);
            camera.position.z = 100;
            function anim() { requestAnimationFrame(anim); mesh.rotation.y += 0.001; renderer.render(scene, camera); }
            anim();
        }

        init();
    </script>
</body>
</html>
