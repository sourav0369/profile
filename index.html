<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sourav Pattanaik | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; cursor: crosshair; font-family: 'EB Garamond', serif; overflow-x: hidden; }
        #canvas-container { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }
        
        /* Navigation Icons */
        nav button { opacity: 0.5; transition: 0.3s; font-family: sans-serif; letter-spacing: 0.2em; }
        nav button.active { opacity: 1; border-bottom: 2px solid white; }

        /* Concave Circular Layout */
        .profile-circle {
            float: left;
            width: 300px;
            height: 300px;
            shape-outside: circle(50%);
            border-radius: 50%;
            margin-right: 40px;
            margin-bottom: 20px;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* Independent Tile Flipping */
        .card-container { perspective: 1000px; height: 350px; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .card-container:hover .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border: 1px solid #222; overflow: hidden; }
        .card-back { transform: rotateY(180deg); background: #fff; color: #000; padding: 25px; display: flex; flex-direction: column; justify-content: center; }

        /* Blog Accordion */
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; }
        .accordion-active .accordion-content { max-height: 500px; padding: 20px 0; }
        
        .fade-in { animation: fadeIn 1s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <nav class="fixed top-0 w-full z-50 flex justify-center gap-12 p-6 bg-black/80 backdrop-blur-md border-b border-white/10">
        <button onclick="showSection('home')" id="btn-home" class="active uppercase text-[10px]">Home</button>
        <button onclick="showSection('blog')" id="btn-blog" class="uppercase text-[10px]">Blogs</button>
        <button onclick="showSection('contact')" id="btn-contact" class="uppercase text-[10px]">Contact</button>
    </nav>

    <main id="main-content" class="pt-32 px-6 max-w-6xl mx-auto min-h-screen"></main>

    <script>
        let portfolioData = null;

        async function init() {
            try {
                const res = await fetch('./data.json');
                if (!res.ok) throw new Error("File Not Found");
                portfolioData = await res.json();
                showSection('home');
                startParticles();
            } catch (e) {
                document.getElementById('main-content').innerHTML = `<div class="text-center py-20">Error: Please ensure data.json is in the root folder.</div>`;
            }
        }

        function showSection(id) {
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${id}`).classList.add('active');
            const main = document.getElementById('main-content');
            
            if (id === 'home') {
                main.innerHTML = `
                <div class="fade-in">
                    <div class="mb-24 block overflow-hidden">
                        <img src="${portfolioData.profile.photo}" class="profile-circle grayscale hover:grayscale-0 transition-all duration-700 shadow-2xl">
                        <h1 class="text-6xl md:text-8xl font-bold uppercase tracking-tighter leading-none mb-6">${portfolioData.profile.name}</h1>
                        <p class="text-2xl italic opacity-90 mb-6 leading-relaxed">
                            "${portfolioData.profile.subTagline}" 
                            As a scholar at NISER, I focus on the intersection of computational drug discovery 
                            and biological network modeling to solve oncological challenges.
                        </p>
                        <div class="flex gap-4">
                            <a href="mailto:${portfolioData.profile.email}" class="border border-white/30 px-8 py-2 hover:bg-white hover:text-black transition uppercase text-[10px] tracking-widest">Email</a>
                            <a href="${portfolioData.profile.cvFilename}" download class="border border-white/30 px-8 py-2 hover:bg-white hover:text-black transition uppercase text-[10px] tracking-widest">Sourav-CV</a>
                        </div>
                    </div>

                    <h2 class="text-center text-xs uppercase tracking-[0.5em] opacity-40 mb-12">Core Pillars</h2>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 pb-20">
                        ${portfolioData.pillars.map(p => `
                            <div class="card-container">
                                <div class="card-inner">
                                    <div class="card-front">
                                        <img src="${p.image}" class="w-full h-full object-cover opacity-40 grayscale">
                                        <div class="absolute bottom-6 left-6 text-xl font-bold uppercase tracking-widest">${p.title}</div>
                                    </div>
                                    <div class="card-back">
                                        <h4 class="font-bold border-b border-black/10 pb-2 mb-4 uppercase text-[10px] tracking-widest">${p.title}</h4>
                                        <ul class="text-[12px] leading-relaxed space-y-2" style="font-family: 'Times New Roman', serif;">
                                            ${p.bullets.map(b => `<li>• ${b}</li>`).join('')}
                                        </ul>
                                    </div>
                                </div>
                            </div>`).join('')}
                    </div>
                </div>`;
            } else if (id === 'blog') {
                main.innerHTML = `
                <div class="max-w-3xl mx-auto py-10 fade-in">
                    <h2 class="text-4xl uppercase mb-16 text-center tracking-[0.3em] opacity-50">Writings & Insights</h2>
                    ${Object.keys(portfolioData.blogs).map(key => `
                        <div class="border border-white/10 bg-white/5 mb-4 group" onclick="this.classList.toggle('accordion-active')">
                            <div class="p-8 cursor-pointer flex justify-between items-center uppercase tracking-[0.2em] text-[10px]">
                                ${key} <span class="text-lg">+</span>
                            </div>
                            <div class="accordion-content px-10 italic text-base opacity-70 leading-relaxed">
                                ${portfolioData.blogs[key].map(post => `<p class="mb-4">${post}</p>`).join('')}
                            </div>
                        </div>`).join('')}
                </div>`;
            } else if (id === 'contact') {
                main.innerHTML = `
                <div class="max-w-xl mx-auto py-20 text-center fade-in">
                    <h2 class="text-5xl uppercase mb-12 tracking-tighter">Connect</h2>
                    <form action="https://formspree.io/f/YOUR_ID" method="POST" class="space-y-6">
                        <input name="email" type="email" placeholder="YOUR EMAIL" class="w-full bg-transparent border-b border-white/20 p-4 text-[10px] tracking-widest focus:border-white outline-none transition">
                        <textarea name="message" placeholder="MESSAGE" class="w-full bg-transparent border-b border-white/20 p-4 text-[10px] tracking-widest h-32 focus:border-white outline-none transition"></textarea>
                        <button class="w-full border border-white/20 py-5 uppercase text-[10px] tracking-[0.3em] hover:bg-white hover:text-black transition">Send Message</button>
                    </form>
                </div>`;
            }
        }

        function startParticles() {
            const container = document.getElementById('canvas-container');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);
            const stars = new THREE.BufferGeometry();
            const posArr = new Float32Array(5000);
            for(let i=0; i<5000; i++) posArr[i] = (Math.random()-0.5)*1200;
            stars.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
            const mesh = new THREE.Points(stars, new THREE.PointsMaterial({size: 0.7, color: 0x444444}));
            scene.add(mesh);
            camera.position.z = 150;
            function anim() { requestAnimationFrame(anim); mesh.rotation.y += 0.0005; renderer.render(scene, camera); }
            anim();
            window.addEventListener('resize', () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        }
        init();
    </script>
</body>
</html>
